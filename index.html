<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Terminal</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0a;
      font-family: monospace;
      font-size: 15px;
      color: #e8e8e8;
      display: flex;
      flex-direction: column;
    }
    #term {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .line { white-space: pre-wrap; }
    .input-row {
      display: flex;
      padding: 8px 16px;
      flex-shrink: 0;
      align-items: flex-start;
    }
    .prompt { margin-right: 6px; padding-top: 2px; }
    #cmd {
      background: transparent;
      border: none;
      outline: none;
      color: #e8e8e8;
      font-family: monospace;
      font-size: 15px;
      flex: 1;
      caret-color: #e8e8e8;
      resize: none;
      overflow: hidden;
      line-height: 1.5;
      min-height: 22px;
    }
  </style>
</head>
<body>
  <div id="term"></div>
  <div class="input-row">
    <span class="prompt">&gt;</span>
    <textarea id="cmd" rows="1" autocomplete="off" spellcheck="false"
      placeholder='type "help" for a basic command list'></textarea>
  </div>

  <script type="module">
    import COMMANDS, { output } from './commands.js';

    const term  = document.getElementById('term');
    const input = document.getElementById('cmd');

    const history = [];
    let histIndex = -1;

    // ---------------------------------------------------------------- Resolve a typed command
    function dispatch(raw) {
      const [word, ...rest] = raw.trim().toLowerCase().split(/\s+/);
      const args = rest.join(' ') || null;

      // clear is handled here so it can wipe the DOM directly
      if (word === 'clear') { term.innerHTML = ''; return; }

      const cmd = COMMANDS.find(c => {
        const triggers = Array.isArray(c.trigger) ? c.trigger : [c.trigger];
        return triggers.includes(word);
      });

      if (cmd) {
        cmd.fn(term, args);
      } else {
        output(term, `Unknown command: ${word}`, '#555');
      }
    }

    // ---------------------------------------------------------------- Echo input
    function printEcho(val) {
      const div = document.createElement('div');
      div.className = 'line';
      div.style.color = '#555';
      const lines = val.split('\n');
      div.textContent = '> ' + lines[0] + lines.slice(1).map(l => '\n  ' + l).join('');
      term.appendChild(div);
      term.scrollTop = term.scrollHeight;
    }

    // ---------------------------------------------------------------- Boot
    input.focus();
    dispatch('look');

    document.addEventListener('click', e => {
      if (e.target !== input) input.focus();
    });

    // ---------------------------------------------------------------- Input resize
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = input.scrollHeight + 'px';
    });

    // ---------------------------------------------------------------- Key handling
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.shiftKey) return;

      if (e.key === 'Enter') {
        e.preventDefault();
        const val = input.value;
        input.value = '';
        input.style.height = 'auto';
        histIndex = -1;

        if (!val.trim()) return;
        history.unshift(val);
        printEcho(val);
        dispatch(val);
        return;
      }

      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (histIndex < history.length - 1) {
          histIndex++;
          input.value = history[histIndex];
          input.style.height = 'auto';
          input.style.height = input.scrollHeight + 'px';
        }
        return;
      }

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (histIndex > 0) {
          histIndex--;
          input.value = history[histIndex];
        } else {
          histIndex = -1;
          input.value = '';
        }
        input.style.height = 'auto';
        input.style.height = input.scrollHeight + 'px';
        return;
      }
    });
  </script>
</body>
</html>
